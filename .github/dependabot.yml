version: 2
updates:
  # Frontend dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    # Collapse all minor/patch bumps into a single PR; majors stay separate
    # so breaking changes still get individual review.
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Hold TypeScript at 6.x. TS 7 is not supported by any stable
      # @typescript-eslint release (peer: "typescript >=4.8.4 <6.1.0"), so a
      # major bump breaks `npm ci` on peer resolution and crashes eslint at
      # load. Remove this once typescript-eslint ships stable TS 7 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Rust backend dependencies (Cargo)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    groups:
      cargo-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-all:
        patterns: ["*"]
