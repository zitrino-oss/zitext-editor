name: Benchmarks

on:
  push:
    branches: [main]
  # Benchmarks track performance over time on main; they don't need to run on
  # every PR (especially noisy Dependabot bumps). Use workflow_dispatch to run
  # them on demand against a branch.
  workflow_dispatch:

# Least privilege: benchmarks only read the repo.
permissions:
  contents: read

jobs:
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.93.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Run benchmarks
        working-directory: src-tauri
        run: |
          set -o pipefail
          cargo bench --bench file_operations -- --output-format bencher 2>&1 | tee bench-output.txt
          node ../scripts/check-benchmark-thresholds.mjs bench-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-results
          path: src-tauri/target/criterion/
