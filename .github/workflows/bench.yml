name: Benchmarks

on:
  push:
    branches: [main]
  # Benchmarks track performance over time on main; they don't need to run on
  # every PR (especially noisy Dependabot bumps). Use workflow_dispatch to run
  # them on demand against a branch.
  workflow_dispatch:

jobs:
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Run benchmarks
        working-directory: src-tauri
        run: cargo bench -- --output-format bencher 2>&1 | tee bench-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: src-tauri/target/criterion/
