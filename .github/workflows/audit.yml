name: Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1' # Weekly Monday 8:00 UTC

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # crates.io downloads on GitHub runners intermittently hit curl error 16
    # ("HTTP/2 framing layer"). Disabling HTTP/2 multiplexing and raising the
    # retry count makes these transient transport errors non-fatal.
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          for attempt in 1 2 3; do
            cargo install cargo-audit --locked && exit 0
            echo "cargo install failed (attempt $attempt) — retrying in 15s..."
            sleep 15
          done
          echo "::error::cargo install cargo-audit failed after 3 attempts" >&2
          exit 1

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit
