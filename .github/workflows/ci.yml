name: CI

# Lint + type-check + build, plus the npm and Cargo dependency audits.
# Consolidated into one workflow so each PR produces a SINGLE run (with several
# jobs) instead of separate "CI" and "Dependency Audit" runs — easier to track.
# Runs on PRs, pushes to main, and a weekly schedule (for the audits).
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1' # Weekly Monday 8:00 UTC

# Least privilege: these jobs only need to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Guard against the class of bug that shipped a blank 2.1.4: react and
      # react-dom MUST be the same version, or react-dom crashes on mount at
      # runtime (the build itself stays green, so nothing else catches it).
      - name: Verify react / react-dom versions match
        run: |
          react_v=$(node -p "require('react/package.json').version")
          reactdom_v=$(node -p "require('react-dom/package.json').version")
          echo "react=$react_v  react-dom=$reactdom_v"
          if [ "$react_v" != "$reactdom_v" ]; then
            echo "::error::react ($react_v) and react-dom ($reactdom_v) must be the same version — a mismatch crashes React at runtime (blank window)."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # crates.io downloads on GitHub runners intermittently hit curl error 16
    # ("HTTP/2 framing layer"). Disabling HTTP/2 multiplexing and raising the
    # retry count makes these transient transport errors non-fatal.
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          for attempt in 1 2 3; do
            cargo install cargo-audit --locked && exit 0
            echo "cargo install failed (attempt $attempt) — retrying in 15s..."
            sleep 15
          done
          echo "::error::cargo install cargo-audit failed after 3 attempts" >&2
          exit 1

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit
